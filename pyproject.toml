[build-system]
requires = ["setuptools >= 64.0.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "void-logging"
version = "0.1.0"
description = "Void's logging library"
readme = "README.md"
authors = [
    { name = "Mathieu Suchet", email = "msuchet63@gmail.com" }
]
license = { file = "LICENSE" }
requires-python = ">=3.8"
dependencies = [
    "rlgym-learn",
    "rlgym[api]"
]

[tool.setuptools]
packages = ["void_logging"]
