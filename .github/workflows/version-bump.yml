name: "Bump version"

on:
    workflow_dispatch:
      inputs:
        bump-type:
          description: "Type of version bump"
          default: patch
          options:
            - major
            - minor
            - patch
            - pre_l
            - pre_n
          required: true
          type: choice
        tag:
          description: Tag?
          type: boolean
          default: false

permissions: 
  contents: write

jobs:
    bump-version:
        runs-on: ubuntu-24.04
        steps:
            - name: Checkout
              uses: actions/checkout@v6
            - name: Bump version
              id: bump
              uses: callowayproject/bump-my-version@master
              env:
                BUMPVERSION_TAG: ${{inputs.tag}}
              with:
                args: ${{ inputs.bump-type }}
                github-token: ${{ secrets.VERSION_PAT }}
            - name: Check
              if: steps.bump.outputs.bumped == 'true'
              run: |
                echo "Version was bumped from ${{ steps.bump.outputs.previous-version }} to ${{ steps.bump.outputs.current-version }}!"
                

              

            
